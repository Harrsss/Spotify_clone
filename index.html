<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="Img/favicon.ico" type="image/x-icon">
</head>

<body>
    <div class="container">
        <div class="left">
            <div class="homesection">
                <div>
                    <div class="logo"> <img class="logoimg" src="Img/logo.svg" alt="logo"></div>
                    <div class="home"><img class="homeimg" src="Img/home.svg" alt="home">Home</div>
                    <div class="search"><img class="searchimg" src="Img/search.svg" alt="search">Search</div>
                </div>
                <div class="close"><img src="Img/close.svg" alt="close"></div>
            </div>
            <div class="library">
                <div class="heading">
                    <img class="libraryimg" src="Img/playlist.svg" alt="library">
                    <h2>Your Library</h2>
                </div>
                <div class="songslists">
                    <ul>
                       
                    </ul>
                </div>
                <div class="footer">
                    <a href="https://www.spotify.com/jp/legal/">Legal</a>
                    <a href="https://www.spotify.com/jp/privacy/">Privacy Center</a>
                    <a href="https://www.spotify.com/jp/legal/privacy-policy/">Privacy Policy</a>
                    <a href="https://www.spotify.com/jp/legal/cookies-policy/">Cookies</a>
                    <a href="https://www.spotify.com/jp/legal/privacy-policy/#s3">About Ads</a>
                    <a href="https://www.spotify.com/jp/accessibility/">Accessibility</a>
                </div>

            </div>
        </div>
        <div class="right">
            <div class="header">
                <div class="navbar">
                    <div class="ham"><img src="Img/hamburger.svg" alt="hamburger"></div>
                    <span class="back">
                        < </span>
                            <span class="next"> > </span>
                </div>
                <div class="button">
                    <button class="signupbtn">Sign Up</button>
                    <button class="loginbtn">Login</button>
                </div>
            </div>
            <div class="spotifyplaylists">
                <div class="above">
                    <h2>Spotify Playlists</h2>
                    <a href="#">Show all</a>
                </div>
                <div class="cardssection">
                
                </div>
            </div> 
            <div class="playbar">
                <div class="infoplaybar">
                    <div id="songname"></div>
                    <div id="songinfo"></div>
                </div>
                <div class="songbtn">
                    <div><img class= "previousbtn" src="Img/previous.svg" alt="previous"></div>
                    <div class="playpause"><img src="Img/play.svg" alt="play"></div>
                    <div><img class= "nextbtn" src="Img/next.svg" alt="next"></div>
                </div>
                <div class="timevol">
                    <div class="songtime">00:00/00:00</div>
                    <div class="volume">
                        <img width="30px" height="30px" src="Img/volume.svg" alt="volume">
                        <div class="range">
                            <input type="range" name="volume" id="">
                        </div>
                    </div>
                </div>
            </div>
            <div class="seekbar">
                <div class="circle"></div>
            </div>
        </div>
        <script src="script.js"></script>
    </div>
</body>

</html>
